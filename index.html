<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Super Super Bonito</title>
    <style>
        /* --- Configuración General --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif; /* Tipografía moderna */
        }

        body {
            background-color: #000000; /* Fondo negro profundo */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Contenedor Principal --- */
        .page-container {
            width: 100%;
            max-width: 450px; /* Ancho máximo para móvil */
            text-align: center;
            padding: 40px 20px;
            background-color: #0a0a0a; /* Fondo oscuro sutil del contenedor */
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 165, 0, 0.15); /* Sombra naranja sutil */
        }

        /* --- Sección superior: Perfil --- */
        .profile {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 15px;
        }

        .profile h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff8c00, #ff4500); /* Degradado naranja en el nombre */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .profile p {
            font-size: 14px;
            color: #aaaaaa;
            letter-spacing: 0.5px;
        }

        /* --- Sección central: Botones Sociales --- */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 45px;
        }

        /* El botón base con borde naranja brillante */
        .social-btn {
            position: relative;
            display: block;
            width: 100%;
            padding: 18px 25px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden; /* Importante para el efecto interior */
            border: 2px solid #ff4500; /* Borde naranja brillante */
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); /* Brillo naranja exterior */
            z-index: 1; /* Para que el texto esté por encima */
        }

        /* Fondo RGB animado dentro del botón */
        .social-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,0,255,0.7), rgba(0,255,255,0.7), rgba(255,255,0,0.7)); /* Degradado RGB sutil */
            background-size: 400% 400%;
            animation: rgb-slide 8s linear infinite; /* Animación */
            z-index: -1; /* Detrás del texto */
            opacity: 0.8; /* Suaviza los colores RGB */
        }

        /* Efecto de "Glow" adicional y pequeño escalado al pasar el ratón */
        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.7); /* Brillo naranja más intenso */
            filter: brightness(1.1); /* Hace que todo el botón brille un poco más */
        }

        /* Animación del degradado RGB */
        @keyframes rgb-slide {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Letra/Texto Divisor --- */
        .divider {
            font-size: 16px;
            font-weight: 700;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 45px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #333333;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* --- Sección inferior: Botón Descarga --- */
        .download-section {
            margin-top: 15px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 30px;
            text-decoration: none;
            color: #000000;
            background-color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            border-radius: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.1);
        }

        .download-btn:hover {
            background-color: #e0e0e0;
            transform: scale(1.03);
            box-shadow: 0 7px 25px rgba(255, 255, 255, 0.2);
        }

        /* Icono de descarga simple */
        .download-btn::before {
            content: '⬇'; /* Icono de flecha hacia abajo */
            font-size: 20px;
        }

    </style>
</head>
<body>

    <div class="page-container">
        
        <!-- Sección de Perfil -->

            <!-- Reemplaza la URL por tu foto real -->
            <img src="https://i.imgur.com/TI2REbs.png" alt="Tu Foto de Perfil" class="profile-img">
            <h1>
            ROBERT CREATIVO</h1>
            <p>Bienvenidos a mi espacio digital</p>
        </div>

        <!-- Sección de Botones Sociales -->
        <div class="social-links">
            <!-- Recuerda cambiar el '#' por tus enlaces reales -->
            <a href="https://tiktok.com/@soy_saxtra" target="_blank" class="social-btn">TikTok</a>
            <a href="https://youtube.com/@Kyzen-RZ" target="_blank" class="social-btn">YouTube</a>
            <a href="https://www.instagram.com/soy_saxtra?igsh=anhxcHY0cXZhNGxy" target="_blank" class="social-btn">Instagram</a>
            <a href="https://www.facebook.com/share/1K13KffaqP/" target="_blank" class="social-btn">Facebook</a>
        </div>

        <!-- Letra Divisora -->
        <div class="divider">MI APPS</div>

        </div>

    </div>

</body>
</html>
