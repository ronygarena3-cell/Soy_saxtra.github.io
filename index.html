<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Redes | RGB Neon</title>
    <!-- Iconos de FontAwesome para que se vea profesional -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fuente moderna Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Efecto de luces de fondo para que no sea aburrido */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 255, 204, 0.15);
            border-radius: 50%;
            filter: blur(100px);
            top: 10%;
            left: 10%;
            animation: moveLight 8s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 0, 128, 0.15);
            border-radius: 50%;
            filter: blur(100px);
            bottom: 10%;
            right: 10%;
            animation: moveLight 8s infinite alternate-reverse ease-in-out;
        }

        @keyframes moveLight {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            text-align: center;
            z-index: 10;
        }

        /* Foto de Perfil con borde RGB giratorio */
        .profile-card {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff007f, #00f0ff, #ff007f, #00f0ff);
            background-size: 400%;
            animation: borderGlow 4s linear infinite;
        }

        .profile-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #050505;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff007f, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        p.username {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* --- BOTONES NEON RGB --- */
        .links-wrapper {
            display: flex;
            direction: ltr;
            flex-direction: column;
            gap: 20px;
        }

        .btn-link {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px 25px;
            background: rgba(15, 15, 15, 0.85);
            border: 2px solid transparent;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(5px);
            
            /* Animación constante del borde de color rápido */
            background-image: linear-gradient(rgba(15, 15, 15, 0.95), rgba(15, 15, 15, 0.95)), 
                              linear-gradient(120deg, #ff0055, #00ffcc, #9b51e0, #ff0055);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 300% 300%;
            animation: fastRGBBorder 3s linear infinite;
            
            /* Brillo de sombra inicial */
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.15), inset 0 0 5px rgba(255, 255, 255, 0.05);
        }

        .btn-link i {
            font-size: 1.4rem;
            transition: transform 0.3s ease;
        }

        /* Efecto Hover (Cuando pasas el mouse o tocas) */
        .btn-link:hover {
            transform: translateY(-4px) scale(1.02);
            background-image: linear-gradient(rgba(20, 20, 20, 0.9), rgba(20, 20, 20, 0.9)), 
                              linear-gradient(120deg, #00ffcc, #ff0055, #00ffcc, #ff0055);
            /* Sombra mucho más intensa y animada */
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.6), 
                        0 0 10px rgba(255, 0, 85, 0.6);
        }

        .btn-link:hover i {
            transform: rotate(15deg) scale(1.2);
        }

        /* Icono de flecha sutil al final del botón */
        .btn-link::after {
            content: '\f105';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.1rem;
            opacity: 0.6;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .btn-link:hover::after {
            transform: translateX(5px);
            opacity: 1;
        }

        /* Colores icónicos personalizados para los iconos */
        .tiktok-icon { color: #00f2fe; text-shadow: 0 0 8px rgba(0, 242, 254, 0.5); }
        .youtube-icon { color: #ff0000; text-shadow: 0 0 8px rgba(255, 0, 0, 0.5); }
        .instagram-icon { color: #f77737; text-shadow: 0 0 8px rgba(247, 119, 55, 0.5); }
        .twitch-icon { color: #a154ff; text-shadow: 0 0 8px rgba(161, 84, 255, 0.5); }

        /* --- ANIMACIONES CSS --- */
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fastRGBBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tarjeta de Perfil -->
        <div class="profile-card">
            <!-- Reemplaza con tu foto de perfil si quieres -->
            <img src="https://i.imgur.com/TI2REbs.png" alt="Foto de Perfil">
        </div>
        
        <h1>CREADOR DE APPS Y WEB</h1>
        <p class="username">Robert</p>

        <!-- Contenedor de Botones -->
        <div class="links-wrapper">
            
            <!-- BOTÓN TIKTOK -->
            <a href="https://tiktok.com/@soy_saxtra" target="_blank" class="btn-link">
                <span><i class="fab fa-tiktok tiktok-icon"></i> &nbsp;&nbsp;TikTok</span>
            </a>

            <!-- BOTÓN YOUTUBE -->
            <a href="https://youtube.com/@Kyzen-RZ" target="_blank" class="btn-link">
                <span><i class="fab fa-youtube youtube-icon"></i> &nbsp;&nbsp;YouTube</span>
            </a>

            <!-- BOTÓN INSTAGRAM -->
            <a href="https://www.instagram.com/soysaxtra?utm_source=qr" target="_blank" class="btn-link">
                <span><i class="fab fa-instagram instagram-icon"></i> &nbsp;&nbsp;Instagram</span>
            </a>


        </div>

        <footer>
            DISEÑO NEON © 2026
        </footer>
    </div>

</body>
  </html>
