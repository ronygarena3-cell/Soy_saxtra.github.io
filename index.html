<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="msvalidate.01" content="F32FECB45D2509AFB96D2B69802D5C76" />

<title>NexodaR</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg: #0a0c10;
    --bg-soft: #12151b;
    --card: #171b23;
    --line: #262b36;
    --text: #eef1f6;
    --text-dim: #9aa3b2;
    --cyan: #00e5c7;
    --magenta: #ff3d7f;
    --amber: #ffb020;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:'Space Grotesk', sans-serif; }
  a{ color:inherit; }
  .wrap{ max-width:560px; margin:0 auto; padding:0 20px; }

  header{
    position:relative;
    padding:48px 0 28px;
    text-align:center;
    overflow:hidden;
  }
  .glow{
    position:absolute; top:-100px; left:50%; transform:translateX(-50%);
    width:300px; height:300px; border-radius:50%;
    filter:blur(70px); opacity:0.3;
    background:conic-gradient(from 0deg, var(--cyan), var(--magenta), var(--amber), var(--cyan));
    animation:spin 10s linear infinite;
  }
  @keyframes spin{ to{ transform:translateX(-50%) rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .glow{ animation:none; } }

  .eyebrow{
    position:relative; z-index:1;
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--text-dim); font-weight:600; margin-bottom:10px;
  }
  h1{
    position:relative; z-index:1;
    font-size:30px; font-weight:700; letter-spacing:-0.01em;
  }
  .subtitle{
    position:relative; z-index:1;
    color:var(--text-dim); font-size:14px; margin-top:8px;
  }

  .search{
    position:relative; z-index:1;
    margin-top:22px;
  }
  .search input{
    width:100%;
    background:var(--bg-soft);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:12px 14px;
    border-radius:10px;
    outline:none;
  }
  .search input::placeholder{ color:var(--text-dim); }
  .search input:focus{ border-color:var(--cyan); }

  main{ padding:12px 0 48px; }

  .count{
    font-size:12px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--text-dim); font-weight:600;
    margin:24px 0 14px;
  }

  .app-card{
    display:flex;
    gap:14px;
    align-items:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
  }
  .app-icon{
    flex:none;
    width:52px; height:52px;
    border-radius:14px;
    background:var(--bg-soft);
    display:flex; align-items:center; justify-content:center;
    gap:3px;
  }
  .app-icon .dot{ width:8px; height:8px; border-radius:50%; }

  .app-info{ flex:1; min-width:0; }
  .app-info h3{ font-size:15px; font-weight:600; margin-bottom:2px; }
  .app-info p{
    font-size:12.5px; color:var(--text-dim);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .app-meta{ font-size:11px; color:var(--text-dim); margin-top:4px; }

  .get-btn{
    flex:none;
    text-decoration:none;
    background:linear-gradient(90deg, var(--cyan), var(--magenta));
    color:#05070a;
    font-weight:600;
    font-size:13px;
    padding:9px 16px;
    border-radius:9px;
    white-space:nowrap;
  }

  .empty{
    text-align:center;
    color:var(--text-dim);
    font-size:13.5px;
    padding:40px 0;
    display:none;
  }

  footer{
    text-align:center;
    padding:20px 0 40px;
    font-size:12px;
    color:var(--text-dim);
  }
</style>
</head>
<body>

  <header>
    <div class="glow"></div>
    <div class="wrap">
      <div class="eyebrow">Tienda independiente</div>
      <h1>Mi Tienda de Apps</h1>
      <p class="subtitle">Aplicaciones para descargar directo, fuera de Google Play.</p>
      <div class="search">
        <input type="text" id="searchInput" placeholder="Buscar una app...">
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="count" id="countLabel"></div>
    <div id="appList"></div>
    <p class="empty" id="emptyMsg">No encontramos ninguna app con ese nombre.</p>
  </main>

  <footer>
    Distribuido de forma independiente, fuera de Google Play.
  </footer>

<script>
  // ── Para agregar una app nueva, copia un bloque {...} y cambia sus datos ──
  const apps = [
    {
      name: "FlashLed Notify",
      description: "Personaliza el color y patrón del flash para cada notificación",
      version: "v1.0",
      size: "0.44 MB",
      colors: ["#00e5c7", "#ff3d7f", "#ffb020"],
      downloadUrl: "https://github.com/ronygarena3-cell/Soy_saxtra.github.io/releases/download/v1/FlashLed.Notify.V1.0.apk"
    }
    // Ejemplo de cómo se vería una segunda app:
    // {
    //   name: "Nombre de la app",
    //   description: "Descripción corta de una línea",
    //   version: "v1.0",
    //   size: "1.2 MB",
    //   colors: ["#00e5c7", "#ff3d7f", "#ffb020"],
    //   downloadUrl: "https://github.com/usuario/repo/releases/download/v1/archivo.apk"
    // }
  ];

  const listEl = document.getElementById('appList');
  const countEl = document.getElementById('countLabel');
  const emptyEl = document.getElementById('emptyMsg');
  const searchEl = document.getElementById('searchInput');

  function render(filter = "") {
    const q = filter.trim().toLowerCase();
    const filtered = apps.filter(a => a.name.toLowerCase().includes(q));

    listEl.innerHTML = filtered.map(app => `
      <div class="app-card">
        <div class="app-icon">
          ${app.colors.map(c => `<span class="dot" style="background:${c}"></span>`).join('')}
        </div>
        <div class="app-info">
        <h3>${app.name}</h3>
          <p>${app.description}</p>
          <div class="app-meta">${app.version} · ${app.size}</div>
        </div>
        <a class="get-btn" href="${app.downloadUrl}" download>Obtener</a>
      </div>
    `).join('');

    countEl.textContent = filtered.length + (filtered.length === 1 ? ' app disponible' : ' apps disponibles');
    emptyEl.style.display = filtered.length === 0 ? 'block' : 'none';
  }

  searchEl.addEventListener('input', e => render(e.target.value));
  render();
</script>

</body>
</html>
